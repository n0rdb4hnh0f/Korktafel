<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GoBBS - シンプル掲示板</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen p-4 md:p-8">
        <div class="max-w-2xl mx-auto">
            <h1
                class="text-3xl font-bold text-gray-800 mb-8 border-b-2 border-blue-500 pb-2"
            >
                GoBBS API Client
            </h1>

            <div class="bg-white p-6 rounded-lg shadow-md mb-8">
                <div class="mb-4">
                    <input
                        type="text"
                        id="author"
                        placeholder="名前 (空欄で名無しさん)"
                        class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                    />
                </div>
                <div class="mb-4">
                    <textarea
                        id="content"
                        placeholder="今なにしてる？"
                        class="w-full p-2 border rounded h-24 focus:outline-none focus:ring-2 focus:ring-blue-400"
                    ></textarea>
                </div>
                <button
                    onclick="createPost()"
                    id="submit-btn"
                    class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600 transition duration-200"
                >
                    投稿する
                </button>
            </div>

            <div id="posts-container" class="space-y-4">
                <p class="text-gray-500 text-center">読み込み中...</p>
            </div>
        </div>

        <script>
            const API_URL = "/posts";

            // 投稿一覧を取得して表示
            async function fetchPosts() {
                try {
                    const res = await fetch(API_URL);
                    const posts = await res.json();
                    const container =
                        document.getElementById("posts-container");
                    container.innerHTML =
                        posts
                            .map(
                                (post) => `
                        <div class="bg-white p-4 rounded shadow border-l-4 border-blue-400">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold text-blue-600">${escapeHtml(post.author)}</span>
                                <span class="text-xs text-gray-400">${new Date(post.created_at).toLocaleString()}</span>
                            </div>
                            <p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(post.content)}</p>
                        </div>
                    `,
                            )
                            .join("") ||
                        '<p class="text-center text-gray-400">投稿はまだありません</p>';
                } catch (err) {
                    console.error("Fetch error:", err);
                }
            }

            // 新規投稿
            async function createPost() {
                const author = document.getElementById("author").value;
                const content = document.getElementById("content").value;
                const btn = document.getElementById("submit-btn");

                btn.disabled = true;
                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ author, content }),
                    });

                    if (res.ok) {
                        document.getElementById("content").value = "";
                        fetchPosts();
                    } else {
                        const errorText = await res.text();
                        alert("エラー: " + errorText);
                    }
                } finally {
                    btn.disabled = false;
                }
            }

            function escapeHtml(str) {
                const div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            fetchPosts();
        </script>
    </body>
</html>
