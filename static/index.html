<!doctype html>
<html lang="ja">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>GoBBS - スレッド掲示板</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="bg-gray-100 min-h-screen p-4 md:p-8">
        <div class="max-w-2xl mx-auto">
            <h1
                onclick="showThreadList()"
                class="text-3xl font-bold text-gray-800 mb-8 border-b-2 border-blue-500 pb-2 cursor-pointer hover:text-blue-600 transition"
            >
                GoBBS Threads
            </h1>

            <div
                id="thread-create-area"
                class="bg-white p-6 rounded-lg shadow-md mb-8"
            >
                <h2 class="text-xl font-bold mb-4">新しいスレッドを立てる</h2>
                <div class="flex gap-2">
                    <input
                        type="text"
                        id="thread-title"
                        placeholder="スレッドタイトル"
                        class="flex-1 p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none"
                    />
                    <button
                        onclick="createThread()"
                        class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600"
                    >
                        作成
                    </button>
                </div>
            </div>

            <div
                id="post-create-area"
                class="bg-white p-6 rounded-lg shadow-md mb-8 hidden"
            >
                <button
                    onclick="showThreadList()"
                    class="text-sm text-blue-500 mb-4 hover:underline"
                >
                    ← スレッド一覧に戻る
                </button>
                <h2
                    id="current-thread-title"
                    class="text-xl font-bold mb-4 text-gray-700"
                ></h2>
                <div class="space-y-4">
                    <input
                        type="text"
                        id="author"
                        placeholder="名前 (空欄で名無しさん)"
                        class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-400 outline-none"
                    />
                    <textarea
                        id="content"
                        placeholder="内容を入力..."
                        class="w-full p-2 border rounded h-24 focus:ring-2 focus:ring-blue-400 outline-none"
                    ></textarea>
                    <button
                        onclick="createPost()"
                        id="submit-btn"
                        class="bg-green-500 text-white px-6 py-2 rounded hover:bg-green-600 w-full transition"
                    >
                        投稿する
                    </button>
                </div>
            </div>

            <div id="main-container" class="space-y-4">
                <p class="text-gray-500 text-center">読み込み中...</p>
            </div>
        </div>

        <script>
            let currentThreadId = null;

            // --- 画面切り替えロジック ---

            // スレッド一覧を表示
            async function showThreadList() {
                currentThreadId = null;
                document
                    .getElementById("thread-create-area")
                    .classList.remove("hidden");
                document
                    .getElementById("post-create-area")
                    .classList.add("hidden");
                fetchThreads();
            }

            // スレッド詳細（投稿一覧）を表示
            async function showThreadDetail(id, title) {
                currentThreadId = id;
                document
                    .getElementById("thread-create-area")
                    .classList.add("hidden");
                document
                    .getElementById("post-create-area")
                    .classList.remove("hidden");
                document.getElementById("current-thread-title").textContent =
                    "スレ: " + title;
                fetchThreadDetail(id);
            }

            // --- API 疎通ロジック ---

            // 1. スレッド一覧取得
            async function fetchThreads() {
                const container = document.getElementById("main-container");
                try {
                    const res = await fetch("/threads");
                    const threads = await res.json();
                    container.innerHTML =
                        threads
                            .map(
                                (t) => `
                        <div onclick="showThreadDetail('${t.id}', '${escapeHtml(t.title)}')"
                             class="bg-white p-4 rounded shadow hover:shadow-md cursor-pointer border-l-4 border-blue-500 transition">
                            <h3 class="font-bold text-lg text-gray-800">${escapeHtml(t.title)}</h3>
                            <p class="text-xs text-gray-400 mt-1">ID: ${t.id}</p>
                        </div>
                    `,
                            )
                            .join("") ||
                        '<p class="text-center text-gray-400">スレッドがありません</p>';
                } catch (err) {
                    container.innerHTML = "エラーが発生しました";
                }
            }

            // 2. スレッド作成
            async function createThread() {
                const title = document.getElementById("thread-title").value;
                if (!title) return alert("タイトルを入力してください");

                const res = await fetch("/threads", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ title }),
                });
                if (res.ok) {
                    document.getElementById("thread-title").value = "";
                    fetchThreads();
                } else {
                    alert("作成失敗: " + (await res.text()));
                }
            }

            // 3. スレッド詳細（紐づく投稿）取得
            async function fetchThreadDetail(id) {
                const container = document.getElementById("main-container");
                try {
                    const res = await fetch(`/threads/${id}`);
                    const thread = await res.json();
                    // thread.posts が Preload されていれば表示される
                    container.innerHTML =
                        (thread.posts || [])
                            .map(
                                (p) => `
                        <div class="bg-white p-4 rounded shadow border-l-4 border-green-400">
                            <div class="flex justify-between text-xs mb-2 text-gray-500">
                                <span class="font-bold text-green-600">${escapeHtml(p.author)}</span>
                                <span>${new Date(p.created_at).toLocaleString()}</span>
                            </div>
                            <p class="text-gray-700 whitespace-pre-wrap">${escapeHtml(p.content)}</p>
                        </div>
                    `,
                            )
                            .reverse()
                            .join("") ||
                        '<p class="text-center text-gray-400">まだ投稿がありません</p>';
                } catch (err) {
                    container.innerHTML = "エラーが発生しました";
                }
            }

            // 4. 投稿作成
            async function createPost() {
                const author = document.getElementById("author").value;
                const content = document.getElementById("content").value;
                const btn = document.getElementById("submit-btn");

                if (!content) return alert("内容を入力してください");

                btn.disabled = true;
                try {
                    const res = await fetch("/posts", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            author,
                            content,
                            thread_id: currentThreadId, // 現在のスレッドIDを紐付け
                        }),
                    });

                    if (res.ok) {
                        document.getElementById("content").value = "";
                        fetchThreadDetail(currentThreadId);
                    } else {
                        alert("エラー: " + (await res.text()));
                    }
                } finally {
                    btn.disabled = false;
                }
            }

            function escapeHtml(str) {
                if (!str) return "";
                const div = document.createElement("div");
                div.textContent = str;
                return div.innerHTML;
            }

            // 初期表示
            showThreadList();
        </script>
    </body>
</html>
